name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Types (mypy)
        run: uv run mypy app
      - name: Architecture (import-linter)
        run: uv run lint-imports
      - name: Unit tests
        run: uv run pytest

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked
      - name: Integration tests (testcontainers PostGIS)
        run: uv run pytest -m integration
